version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  get: ^4.7.3
  google_fonts: ^8.0.2
  intl: ^0.20.2
  html_unescape: ^2.0.0
  html: ^0.15.6
  flutter_svg: ^2.2.4
